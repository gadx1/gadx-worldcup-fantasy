<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>GADX Worldcup</title>

    <!-- Standard + SVG favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <!-- iOS "Add to Home Screen": Safari uses this PNG as the home-screen icon. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Name shown under the icon on the home screen. -->
    <meta name="apple-mobile-web-app-title" content="GADX Worldcup" />

    <!-- PWA manifest + theme color (pitch green). -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0B3D2E" />
    <meta
      name="description"
      content="GADX World Cup Draw — a private fantasy tournament for drawing teams and tracking the leaderboard."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
